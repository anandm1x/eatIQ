<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EatIQ - Smart Food Price Checker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#111827;
}

.logo{
font-size:24px;
font-weight:700;
color:#ff7e5f;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav ul li{
cursor:pointer;
}

/* HERO */

.hero{
text-align:center;
margin-top:80px;
}

.hero h1{
font-size:40px;
}

.hero span{
color:#ff7e5f;
}

/* SEARCH BOX */

.search-box{
margin-top:30px;
}

input{
padding:12px;
width:280px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:12px 20px;
border:none;
background:#ff7e5f;
color:white;
border-radius:8px;
cursor:pointer;
}

/* RESULTS */

.results{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
flex-wrap:wrap;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
width:200px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.price{
font-size:22px;
color:#10b981;
}

.best{
background:#065f46;
}

footer{
margin-top:80px;
text-align:center;
padding:20px;
background:#111827;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>
<div class="logo">EatIQ</div>

<ul>
<li>Home</li>
<li>Compare</li>
<li>About</li>
<li>Contact</li>
</ul>
</nav>

<!-- HERO SECTION -->

<div class="hero">
<h1>Compare Food Prices with <span>EatIQ</span></h1>
<p>Find the cheapest food across all delivery apps instantly</p>

<div class="search-box">
<input id="food" placeholder="Search Food (e.g. Burger)">
<button onclick="searchFood()">Search</button>
</div>
</div>

<!-- RESULTS -->

<div class="results" id="results"></div>

<footer>
© 2026 EatIQ | Smart Food Price Comparison
</footer>

<script>

function searchFood(){

let food=document.getElementById("food").value;

let data=[
{app:"Swiggy",price:220},
{app:"Zomato",price:200},
{app:"Magicpin",price:180}
];

let lowest=Math.min(...data.map(d=>d.price));

let output="";

data.forEach(item=>{

output+=`

<div class="card ${item.price==lowest ? "best":""}">
<h3>${item.app}</h3>
<p>${food}</p>
<p class="price">₹${item.price}</p>
${item.price==lowest ? "<p>🔥 Best Price</p>" : ""}
</div>

`;

});

document.getElementById("results").innerHTML=output;

}

</script>

</body>
</html>
